<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>StreetSupply</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <!--  Main Dashboard Page -->
  <div id="mainPage" class="p-6">
    <div class="flex justify-between items-center">
      <h1 class="text-2xl font-bold text-orange-500">StreetSupply</h1>
      <button onclick="logout()" class="bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded">Logout</button>
    </div>
    <p class="mt-10 text-xl">Welcome to your Dashboard!</p>
  </div>

  <!-- Logout Page -->
  <div id="logoutPage" class="hidden flex flex-col justify-center items-center h-screen text-center">
    <h2 class="text-2xl font-bold mb-4 text-green-400"> You have successfully logged out.</h2>
    <button onclick="login()" class="bg-blue-500 hover:bg-blue-600 px-6 py-2 rounded text-white">
      🔐 Tap here to login again
    </button>
  </div>

  <!-- 🔧 JavaScript -->
  <script>
    function logout() {
      document.getElementById("mainPage").style.display = "none";
      document.getElementById("logoutPage").style.display = "flex";
    }

    function login() {
      document.getElementById("logoutPage").style.display = "none";
      document.getElementById("mainPage").style.display = "block";
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f3f3f3;
      font-family: Arial, sans-serif;
    }
    .thank-box {
      background: white;
      padding: 40px 60px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    .thank-box h1 {
      margin: 0;
      font-size: 28px;
      color: #333;
    }
    .thank-box p {
      margin-top: 10px;
      color: #666;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="thank-box">
    <h1>Thank You for Your Order!</h1>
  </div>
</body>
</html>
